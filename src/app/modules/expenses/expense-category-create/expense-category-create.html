<div class="category-form-wrap">
  <div class="form-card">
    <div class="form-card-header">
      <h4>{{ isEditMode ? 'Edit Expense Category' : 'Create Expense Category' }}</h4>
    </div>

    <div class="form-card-body">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

        <div class="row">

          <!-- Category Code -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Category Code <span class="required">*</span></label>
            <input type="text" class="form-control" formControlName="category_code" placeholder="e.g. TRAVEL">
            <div class="text-danger small mt-1" *ngIf="categoryForm.get('category_code')?.touched && categoryForm.get('category_code')?.invalid">
              Category code is required
            </div>
          </div>

          <!-- Category Name -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Category Name <span class="required">*</span></label>
            <input type="text" class="form-control" formControlName="category_name" placeholder="e.g. Travel Expenses">
            <div class="text-danger small mt-1" *ngIf="categoryForm.get('category_name')?.touched && categoryForm.get('category_name')?.invalid">
              Category name is required
            </div>
          </div>

          <!-- Description -->
          <div class="col-md-12 mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="3" formControlName="category_description" placeholder="Optional description..."></textarea>
          </div>

          <!-- Taxable -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Is Taxable?</label>
            <select class="form-control" formControlName="is_taxable">
              <option [value]="1">Yes</option>
              <option [value]="0">No</option>
            </select>
          </div>

          <!-- Status (edit mode only) -->
          <div class="col-md-6 mb-3" *ngIf="isEditMode">
            <label class="form-label">Status</label>
            <select class="form-control" formControlName="is_active">
              <option [value]="1">Active</option>
              <option [value]="0">Inactive</option>
            </select>
          </div>

        </div>

        <!-- Action Buttons -->
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="cancel()">
            Cancel
          </button>
          <button type="submit" class="btn btn-submit" [disabled]="loading">
            <span *ngIf="loading"><i class="bi bi-hourglass-split me-1"></i>Saving...</span>
            <span *ngIf="!loading && !isEditMode"><i class="bi bi-plus-circle me-1"></i>Create Category</span>
            <span *ngIf="!loading && isEditMode"><i class="bi bi-check-circle me-1"></i>Update Category</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
