<div class="container-fluid py-3 candidate-detail-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h4 class="mb-0">Candidate</h4>
    <div class="d-flex gap-2 flex-wrap">
      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="back()">Back</button>
      <button type="button" class="btn btn-outline-primary btn-sm" (click)="edit()" *ngIf="candidate">Edit</button>
      <button type="button" class="btn btn-primary btn-sm" (click)="interview()" *ngIf="candidate">Schedule interview</button>
      <button type="button" class="btn btn-success btn-sm" (click)="offer()" *ngIf="candidate">Create offer</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-muted">Loading…</div>
  <div *ngIf="error" class="alert alert-warning">{{ error }}</div>

  <div *ngIf="!loading && candidate" class="card shadow-sm">
    <div class="card-body">
      <h5>{{ candidate.first_name }} {{ candidate.last_name }}</h5>
      <p class="text-muted small mb-2">{{ candidate.email }} · {{ candidate.phone || '—' }}</p>
      <p><span class="badge bg-secondary">{{ candidate.status }}</span></p>
      <p class="small" *ngIf="candidate.job_title"><strong>Job:</strong> {{ candidate.job_title }} ({{ candidate.job_code }})</p>
      <p class="small" *ngIf="candidate.current_company"><strong>Company:</strong> {{ candidate.current_company }}</p>
      <p class="small" *ngIf="candidate.cover_letter" style="white-space: pre-wrap">{{ candidate.cover_letter }}</p>
    </div>
  </div>
</div>
