<div class="container-fluid py-3 offer-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Create offer</h4>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancel()">Cancel</button>
  </div>
  <p class="text-muted small" *ngIf="candidateName">Candidate: <strong>{{ candidateName }}</strong></p>
  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

  <div class="card shadow-sm">
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label class="form-label small">Offer code *</label>
        <input class="form-control form-control-sm" [(ngModel)]="offer_code" name="ocode" />
      </div>
      <div class="col-md-6">
        <label class="form-label small">Designation *</label>
        <input class="form-control form-control-sm" [(ngModel)]="designation" name="des" />
      </div>
      <div class="col-md-6">
        <label class="form-label small">Joining date *</label>
        <input type="date" class="form-control form-control-sm" [(ngModel)]="joining_date" name="jd" />
      </div>
      <div class="col-md-6">
        <label class="form-label small">CTC (annual) *</label>
        <input type="number" class="form-control form-control-sm" [(ngModel)]="ctc" name="ctc" min="0" step="0.01" />
      </div>
      <div class="col-md-6">
        <label class="form-label small">Department</label>
        <select class="form-select form-select-sm" [(ngModel)]="department_id" name="dept">
          <option [ngValue]="null">—</option>
          <option *ngFor="let d of departments" [ngValue]="d.department_id">{{ d.department_name }}</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small">Basic salary</label>
        <input type="number" class="form-control form-control-sm" [(ngModel)]="basic_salary" name="basic" min="0" step="0.01" />
      </div>
      <div class="col-12">
        <button type="button" class="btn btn-primary btn-sm" (click)="submit()" [disabled]="saving || loading">
          {{ saving ? 'Saving…' : 'Create offer' }}
        </button>
      </div>
    </div>
  </div>
</div>
