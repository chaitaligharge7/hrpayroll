<div class="container-fluid py-3 interview-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Schedule interview</h4>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancel()">Cancel</button>
  </div>
  <p class="text-muted small" *ngIf="candidateName">Candidate: <strong>{{ candidateName }}</strong></p>
  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label small">Date & time *</label>
        <input type="datetime-local" class="form-control form-control-sm" [(ngModel)]="scheduledAt" name="dt" />
      </div>
      <div class="mb-3">
        <label class="form-label small">Interviewers * (check all that apply)</label>
        <div class="border rounded p-2" style="max-height: 200px; overflow-y: auto">
          <div class="form-check small" *ngFor="let e of employees">
            <input
              class="form-check-input"
              type="checkbox"
              [id]="'em-' + e.employee_id"
              [checked]="isSelected(e.employee_id)"
              (change)="toggleInterviewer(e.employee_id, $any($event.target).checked)"
            />
            <label class="form-check-label" [for]="'em-' + e.employee_id">
              {{ e.employee_code }} — {{ e.first_name }} {{ e.last_name }}
            </label>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small">Type</label>
        <input class="form-control form-control-sm" [(ngModel)]="interviewType" name="itype" placeholder="Technical, HR…" />
      </div>
      <div class="mb-3">
        <label class="form-label small">Location</label>
        <input class="form-control form-control-sm" [(ngModel)]="interviewLocation" name="iloc" />
      </div>
      <button type="button" class="btn btn-primary btn-sm" (click)="submit()" [disabled]="saving || loading">
        {{ saving ? 'Saving…' : 'Schedule' }}
      </button>
    </div>
  </div>
</div>
