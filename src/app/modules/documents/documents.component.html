<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Documents</h4>
    <button type="button" class="btn btn-outline-primary btn-sm" (click)="loadDocuments()" [disabled]="loading">Refresh</button>
  </div>

  <div class="card mb-3">
    <div class="card-body row g-2">
      <div class="col-md-4">
        <label class="form-label small">Document type</label>
        <input class="form-control form-control-sm" [(ngModel)]="filters.document_type" (change)="onFilterChange()" />
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-muted">Loading…</div>
  <div *ngIf="!loading && documents.length === 0" class="text-muted">No documents found.</div>

  <div class="table-responsive" *ngIf="!loading && documents.length > 0">
    <table class="table table-sm table-striped">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of documents">
          <td>{{ d.document_name || d.name || '—' }}</td>
          <td>{{ d.document_type || d.type || '—' }}</td>
          <td>
            <button *ngIf="d.file_path || d.path" type="button" class="btn btn-link btn-sm p-0" (click)="downloadDocument(d.file_path || d.path)">Download</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
