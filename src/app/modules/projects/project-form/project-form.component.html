<div class="container-fluid py-3 project-form-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Create project</h4>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancel()">Cancel</button>
  </div>
  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="card shadow-sm">
    <div class="card-body row g-3">
      <div class="col-md-4">
        <label class="form-label small">Project code *</label>
        <input class="form-control form-control-sm" formControlName="project_code" />
      </div>
      <div class="col-md-8">
        <label class="form-label small">Project name *</label>
        <input class="form-control form-control-sm" formControlName="project_name" />
      </div>
      <div class="col-12">
        <label class="form-label small">Description</label>
        <textarea class="form-control form-control-sm" rows="2" formControlName="project_description"></textarea>
      </div>
      <div class="col-md-6">
        <label class="form-label small">Client</label>
        <input class="form-control form-control-sm" formControlName="client_name" />
      </div>
      <div class="col-md-6">
        <label class="form-label small">Project manager</label>
        <select class="form-select form-select-sm" formControlName="project_manager_id">
          <option [ngValue]="null">—</option>
          <option *ngFor="let e of managers" [ngValue]="e.employee_id">
            {{ e.employee_code }} — {{ e.first_name }} {{ e.last_name }}
          </option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label small">Start date</label>
        <input type="date" class="form-control form-control-sm" formControlName="start_date" />
      </div>
      <div class="col-md-4">
        <label class="form-label small">End date</label>
        <input type="date" class="form-control form-control-sm" formControlName="end_date" />
      </div>
      <div class="col-md-4">
        <label class="form-label small">Budget</label>
        <input type="number" class="form-control form-control-sm" formControlName="budget" min="0" step="0.01" />
      </div>
      <div class="col-md-4">
        <label class="form-label small">Billing rate</label>
        <input type="number" class="form-control form-control-sm" formControlName="billing_rate" min="0" step="0.01" />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="bill" formControlName="is_billable" />
          <label class="form-check-label small" for="bill">Billable</label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary btn-sm" [disabled]="saving || loadingManagers">
          {{ saving ? 'Saving…' : 'Create project' }}
        </button>
      </div>
    </div>
  </form>
</div>
