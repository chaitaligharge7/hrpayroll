<div class="container-fluid py-3">

  <!-- Header with title and buttons -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1">
          <li class="breadcrumb-item"><a class="text-decoration-none" (click)="cancel()">Projects</a></li>
          <li class="breadcrumb-item active" aria-current="page">{{ isEditMode ? 'Edit Project' : 'Create Project' }}</li>
        </ol>
      </nav>
      <h4 class="mb-0">{{ isEditMode ? 'Edit Project' : 'Create Project' }}</h4>
    </div>
    <div>
      <button type="button" class="btn btn-back-custom" (click)="cancel()">
        <i class="bi bi-arrow-left-circle me-1"></i> Back
      </button>
    </div>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <strong>Success!</strong> {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = null"></button>
  </div>

  <!-- Error Message -->
  <div *ngIf="error && !successMessage" class="alert alert-danger alert-sm mb-3" role="alert">
    <i class="bi bi-exclamation-circle-fill me-2"></i> {{ error }}
  </div>

  <div class="card">
    <div class="card-body">
      <form id="projectForm" [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
        <div class="form-group">
          <label class="form-label">Project code *</label>
          <input
            type="text"
            class="form-control"
            formControlName="project_code"
            placeholder="e.g. PROJ-001"
          />
          <div class="form-error" *ngIf="form.get('project_code')?.touched && form.get('project_code')?.invalid">
            Project code is required
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Project name *</label>
          <input
            type="text"
            class="form-control"
            formControlName="project_name"
            placeholder="e.g. Website Redesign"
          />
          <div class="form-error" *ngIf="form.get('project_name')?.touched && form.get('project_name')?.invalid">
            Project name is required
          </div>
        </div>

        <div class="form-group full-width">
          <label class="form-label">Description</label>
          <textarea
            class="form-control"
            rows="3"
            formControlName="project_description"
            placeholder="Enter project description..."
          ></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Client</label>
          <input
            type="text"
            class="form-control"
            formControlName="client_name"
            placeholder="e.g. Acme Corp"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Project Manager</label>
          <select class="form-select" formControlName="project_manager_id">
            <option [ngValue]="null">— Select Manager —</option>
            <option *ngFor="let e of managers" [ngValue]="e.employee_id">
              {{ e.first_name }} {{ e.last_name }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" class="form-control" formControlName="start_date" />
        </div>

        <div class="form-group">
          <label class="form-label">End Date</label>
          <input type="date" class="form-control" formControlName="end_date" />
        </div>

        <div class="form-group">
          <label class="form-label">Budget</label>
          <input
            type="number"
            class="form-control"
            formControlName="budget"
            placeholder="0.00"
            min="0"
            step="0.01"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Billing Rate</label>
          <input
            type="number"
            class="form-control"
            formControlName="billing_rate"
            placeholder="0.00"
            min="0"
            step="0.01"
          />
        </div>

        <div class="form-group checkbox-group">
          <label class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="is_billable" />
            <span class="form-check-label">Billable Project</span>
          </label>
        </div>

        <div class="form-group text-end mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="saving || loadingManagers">
            <i class="bi bi-check-circle me-1"></i>
            {{ saving ? (isEditMode ? 'Updating...' : 'Creating...') : (isEditMode ? 'Update Project' : 'Create Project') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()" [disabled]="saving">
            <i class="bi bi-x-circle me-1"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
