<div class="form-container">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEditMode ? 'Edit Designation' : 'Create Designation' }}</h3>
    </div>

    <div class="card-body">
      <!-- Loading (only for edit fetch) -->
      <div *ngIf="loading && isEditMode" class="loading-text">Loading...</div>

      <form (ngSubmit)="onSubmit()">
        <!-- Name -->
        <div class="form-group">
          <label>Name *</label>
          <input
            type="text"
            [(ngModel)]="form.designation_name"
            name="designation_name"
            class="form-control"
            placeholder="Enter designation name"
            required
          />
        </div>

        <!-- Code -->
        <div class="form-group">
          <label>Code</label>
          <input
            type="text"
            [(ngModel)]="form.designation_code"
            name="designation_code"
            class="form-control"
            placeholder="Enter designation code"
          />
        </div>

        <!-- Department -->
        <div class="form-group">
          <label>Department *</label>
          <select
            [(ngModel)]="form.department_id"
            name="department_id"
            class="form-select"
            required
          >
            <option value="">Select Department</option>
            <option *ngFor="let d of departments" [ngValue]="d.department_id">
              {{ d.department_name }}
            </option>
          </select>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            [(ngModel)]="form.designation_description"
            name="designation_description"
            class="form-control"
            placeholder="Enter designation description"
          />
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
          </button>

          <button type="button" class="btn btn-secondary" (click)="cancel()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
