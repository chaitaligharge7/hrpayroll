<p>{{ isEditMode ? 'Edit' : 'Create' }} Department</p>
<form (ngSubmit)="onSubmit()">
  <input [(ngModel)]="form.department_name" name="name" placeholder="Department Name" required />
  
  <input [(ngModel)]="form.department_code" name="code" placeholder="Department Code" required />

  <input [(ngModel)]="form.department_description" name="desc" placeholder="Description" />

  <button type="submit" [disabled]="loading">{{ isEditMode ? 'Update' : 'Create' }} Department</button>
</form>
