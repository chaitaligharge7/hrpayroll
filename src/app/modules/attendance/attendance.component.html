<div class="container-fluid py-3">
  <h4 class="mb-3">Attendance</h4>

  <div *ngIf="message" class="alert alert-info py-2">{{ message }}</div>

  <div class="card mb-4">
    <div class="card-body row g-2 align-items-end">
      <div class="col-md-6">
        <label class="form-label small text-muted">Location (optional)</label>
        <input class="form-control form-control-sm" [(ngModel)]="location" placeholder="Office / Remote" />
      </div>
      <div class="col-md-6 text-md-end">
        <button type="button" class="btn btn-success btn-sm me-2" (click)="checkIn()">Check in</button>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="checkOut()">Check out</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>Recent records</span>
      <button type="button" class="btn btn-link btn-sm p-0" (click)="loadList()" [disabled]="loading">Refresh</button>
    </div>
    <div class="card-body p-0">
      <div *ngIf="loading" class="p-3 text-muted">Loading…</div>
      <div *ngIf="!loading && records.length === 0" class="p-3 text-muted">No attendance records.</div>
      <div class="table-responsive" *ngIf="!loading && records.length > 0">
        <table class="table table-sm table-striped mb-0">
          <thead>
            <tr>
              <th>Date</th>
              <th>Check in</th>
              <th>Check out</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of records">
              <td>{{ r.attendance_date || r.date | date:'mediumDate' }}</td>
              <td>{{ r.check_in_time || r.check_in | date:'shortTime' }}</td>
              <td>{{ r.check_out_time || r.check_out | date:'shortTime' }}</td>
              <td>{{ r.status || '—' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
