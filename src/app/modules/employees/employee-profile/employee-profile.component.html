<div class="container-fluid py-3">
  <div *ngIf="loading" class="text-muted">Loading…</div>
  <div *ngIf="error" class="alert alert-warning">{{ error }}</div>

  <div *ngIf="!loading && employee && employeeId">
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h4 class="mb-1">{{ employee.first_name }} {{ employee.last_name }}</h4>
        <p class="text-muted mb-0">
          {{ employee.employee_code }}
          <span *ngIf="employee.department_name"> · {{ employee.department_name }}</span>
          <span *ngIf="employee.designation_name"> · {{ employee.designation_name }}</span>
        </p>
      </div>
      <button type="button" class="btn btn-primary btn-sm" (click)="edit()">Edit</button>
    </div>

    <div class="card mb-4">
      <div class="card-header">Letters</div>
      <div class="card-body">
        <app-employee-letters [employeeId]="employeeId"></app-employee-letters>
      </div>
    </div>
  </div>
</div>
